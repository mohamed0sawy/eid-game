<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Only for you ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="scene3_secret.css" />
</head>
<body>

<div id="secret-scene">

    <!-- Black base -->
    <div id="secret-bg"></div>

    <!-- Fullscreen video -->
    <video
            id="secret-video"
            src="assets/secret_video.mp4"
            playsinline
            preload="auto"
    ></video>

    <!-- Dark blur overlay — shown after video ends -->
    <div id="video-overlay" class="hidden"></div>

    <!-- Message container -->
    <div id="message-wrap" class="hidden">
        <div id="message-lines"></div>
        <button id="continue-btn" class="hidden">Continue</button>
    </div>

    <!-- Secret audio -->
    <audio
            id="secret-music"
            src="assets/secret_music.mp3"
            loop
            preload="auto"
    ></audio>

</div>

<script src="scene3_secret.js"></script>
</body>
</html>
